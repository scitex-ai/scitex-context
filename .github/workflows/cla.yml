name: CLA Assistant

# MIGRATED: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10
# incident remediation — see scitex-ai/scitex-stats PR #69 for the piloted
# pattern). Triggers/permissions preserved verbatim from the prior local
# file. This repo's allowlist ("bot*,ywatanabe1989,LLEmacs") differs from
# the reusable workflow's default owner_allowlist ("bot*,ywatanabe1989"), so
# an explicit `with:` override is kept below.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  call:
    uses: scitex-ai/.github/.github/workflows/cla.yml@main
    secrets: inherit
    with:
      owner_allowlist: "bot*,ywatanabe1989,LLEmacs"